<!DOCTYPE html>
<html>
<head>
    <title>Laundry Management - Welcome</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 50px 20px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .welcome-container {
            text-align: center;
            max-width: 500px;
        }
        h1 { font-size: 48px; margin-bottom: 20px; }
        p { font-size: 20px; margin-bottom: 40px; opacity: 0.9; }
        .start-btn { 
            display: inline-block; 
            background: white; 
            color: #667eea; 
            padding: 15px 40px; 
            border-radius: 30px; 
            text-decoration: none; 
            font-size: 18px; 
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .start-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <h1>🧺 Laundry Management</h1>
        <p>Professional laundry order management system with real-time validation, JWT authentication, and MongoDB Atlas integration.</p>
<a href="auth.html" class="start-btn">🚀 Get Started</a>
        <p style="margin-top: 30px; font-size: 14px; opacity: 0.7;">
            Backend running at <code style="background: rgba(255,255,255,0.2); padding: 2px 6px; border-radius: 4px;">http://127.0.0.1:8000</code>
        </p>
    </div>
</body>
</html>
